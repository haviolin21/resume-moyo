<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="32" height="32">
  <defs>
    <!-- iOS 앱 아이콘 스타일의 둥근 모서리 클립 패스 -->
    <clipPath id="rounded-corners">
      <rect x="0" y="0" width="512" height="512" rx="100" ry="100" />
    </clipPath>
  </defs>
  <!-- 원본 이미지를 불러와 클립 패스를 적용하여 모서리를 둥글게 깎음 -->
  <image href="/favicon_raw.png" width="512" height="512" clip-path="url(#rounded-corners)" />
</svg>